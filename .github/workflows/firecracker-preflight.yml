name: firecracker-preflight

# Firecracker executable proof. This uses a self-hosted x64 KVM runner for the
# full Firecracker toolchain (Firecracker binary, busybox, cpio, uncompressed
# guest kernel). The default QEMU lane runs on stock GitHub-hosted runners,
# which now expose /dev/kvm (see bpfcompat-example-hosted.yml).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  firecracker-preflight:
    runs-on: [self-hosted, linux, x64, kvm]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify KVM
        run: |
          test -e /dev/kvm || (echo "::error::/dev/kvm not found" && exit 1)

      - name: Install Firecracker release
        run: make firecracker-install

      - name: Run Firecracker preflight
        run: make firecracker-preflight

      - name: Run Firecracker validator proof
        run: make acceptance-firecracker-dev-one
